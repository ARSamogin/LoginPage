<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form action="login.html">
        <div class="wrapper">

            <div class="first_name">
                <input type="text" name="first_name" id="FirstName" placeholder="Nome" required>
            </div>

            <div class="last_name">
                <input type="text" name="last_name" id="LastName" placeholder="Sobrenome" required>
            </div>
            
            <div class="email">
                <input type="email" name="email" id="Email" placeholder="Email" required>
            </div>

            <div class="pass">
                <input type="password" name="senha" id="Senha" placeholder="Senha" minlength="4" maxlength="12" required>
            </div>
        
            <div class="confirmpass">
                <input type="password" name="confirmar_senha" id="ConfirmarSenha" placeholder="Confirme a senha" minlength="4" maxlength="12" required>
            </div>

            <div class="button">
                <button type="submit">Cadastrar</button>
            </div>

        </div>
    </form>
</body>
</html>
