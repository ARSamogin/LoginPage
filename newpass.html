<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="">
        <div class="wrapper">

            <div class="resetting">
                <input type="password" name="Nova senha" id="Senha" placeholder="Digite a nova senha" required>
                <br>
                <input type="password" name="confirm" id="ConfirmarSenha" placeholder="Confirme a nova senha" required>

            </div>

            <div class="button">
                <button type="submit" >Enviar</button>
            </div>

        </div>
    </form>

    <script src="passcheck.js"></script>
</body>
</html>
