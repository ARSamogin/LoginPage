<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <div class="wrapper">
        
            <div class="login">
                <input type="email" name="email" id="Email" placeholder="Email" required>
                <br>
                <input type="password" name="password" id="Senha" placeholder="Senha" required>
            </div>

            <div class="remember">
                <div class="check">
                    <input type="checkbox" name="remember" id="lembrar">
                    <label for="lembrar">Lembrar de mim</label>
                </div>
                <a href="newpass.html">Esqueci a Senha</a>
            </div>

            <div class="button">
                <button type="submit">Entrar</button>
            </div>

            <div class="register">
                <p>Não tem uma conta? <a href="register.html">Registre-se</a></p>
            </div>
         
        </div>    
    </form>
</body>
</html>
